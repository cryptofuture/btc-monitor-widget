        percent = (100 - ((global.asset50[3] * price[0]) / (global.asset50[2] * global.asset50[3]) * 100)).toFixed(2)
       }
       document.getElementById('asset50profit').innerHTML = ((global.asset50[3] * price[0]) - (global.asset50[2] * global.asset50[3])).toFixed(2) + '<br>' + sign + percent + '%' + ' (' + global.asset50[3] + ')'
    })
    } else {
        document.getElementById('asset50').style.display = 'none'
    }
    </script>
</body>
