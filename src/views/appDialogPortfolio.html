<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../styles/uikit/css/uikit.min.css" />
    <link rel="stylesheet" href="../styles/main/css/scrollbar-dialog.css" />
    <script src="../styles/uikit/js/uikit.min.js"></script>
    <script src="../styles/uikit/js/uikit-icons.min.js"></script>
    <script src="../app/index.js"></script>
    <script src="../styles/art/js/template-web.js"></script>
</head>

<body>
    <div id="content"></div>
    <script id="template" type="text/html">
        <div id="notification" class="uk-modal-full" uk-modal>
            <div class="uk-modal-dialog">
                <button style="cursor: pointer" onclick="nw.Window.get().close()" class="uk-modal-close-full uk-close-large" type="button" uk-close></button>
                <div class="uk-modal-header">
                    <h2 class="uk-modal-title">{{addAsset}}</h2>
                    <legend class="uk-legend">Ticker</legend>
                    <div class="uk-margin">
                        <input id="ticker" class="uk-input" type="text" placeholder="BTC">
                    </div>
                    <legend class="uk-legend">{{quantity}}</legend>
                    <div class="uk-margin">
                        <input id="quantity" class="uk-input" type="number" min="0" step="0.000001" placeholder="0.1">
                    </div>
                    <legend class="uk-legend">{{acquire}}</legend>
                    <div class="uk-margin">
                        <input id="price" class="uk-input" type="number" step="0.000001" min="0" placeholder={{BTCUSDT}}>
                    </div>
                <div class="uk-modal-footer uk-text-right">
                    <button style="cursor: pointer" onclick="prefs.setAsset(document.getElementById('ticker').value,document.getElementById('quantity').value,document.getElementById('price').value);nw.Window.get().close()" class="uk-button-large uk-button-primary" type="button">{{addAsset}}</button>
                </div>
            </div>
        </div>
</script>
<script>
    function toTitle (str) {
      return str.replace(/(^|\s)\S/g, function (t) { return t.toUpperCase() })
    }
    var win = nw.Window.get()
    win.menu = null
    var content = JSON.parse(win.title)
    var data = {
        stylesFile: global.stylesFile,
        BTCUSDT: process.env.BTC_USD,
        addAsset: lang.echo('Add Asset'),
        quantity: lang.echo('Quantity'),
        acquire: lang.echo('Acquire price')
    }
    var html = template('template', data)
    document.getElementById('content').innerHTML = html
    document.title = content.window
    UIkit.modal('#notification', {escClose: false, bgClose: false}).show()
    </script>
</body>

</html>
